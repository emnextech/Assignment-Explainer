<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Confirm your new Assignment Explainer email</title>
  </head>
  <body style="margin:0;background:#f6efe6;font-family:'Trebuchet MS','Segoe UI',sans-serif;color:#152033;">
    <div style="padding:32px 16px;">
      <div style="max-width:640px;margin:0 auto;background:#ffffff;border-radius:32px;overflow:hidden;box-shadow:0 20px 50px rgba(21,32,51,0.08);">
        <div style="background:linear-gradient(135deg,#0f766e 0%,#152033 100%);padding:32px;color:#ffffff;">
          <div style="font-size:13px;letter-spacing:0.24em;text-transform:uppercase;opacity:0.72;">Assignment Explainer</div>
          <h1 style="margin:16px 0 0;font-family:Georgia,Cambria,'Times New Roman',serif;font-size:38px;line-height:1.15;">Confirm your new email</h1>
          <p style="margin:16px 0 0;font-size:16px;line-height:1.7;color:rgba(255,255,255,0.82);">
            We need to verify this new address before it becomes the primary login for your account.
          </p>
        </div>
        <div style="padding:32px;">
          <p style="margin:0 0 24px;font-size:16px;line-height:1.8;color:#415065;">
            Confirm this email change to keep your account secure.
          </p>
          <a href="{{ .ConfirmationURL }}" style="display:inline-block;background:#df6d2d;color:#ffffff;text-decoration:none;padding:16px 28px;border-radius:999px;font-size:15px;font-weight:700;">
            Confirm new email
          </a>
          <p style="margin:24px 0 0;font-size:14px;line-height:1.8;color:#657286;">
            If this change was not expected, review your account security immediately.
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
